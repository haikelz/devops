syntax = "proto3";

package whatsapp;

option go_package = "./whatsapp";

import "google/protobuf/timestamp.proto";

message QREvent {
  string event = 1;
  string code  = 2;
  string error = 3;
}

message IncomingMessageEvent {
  string message_id        = 1;
  string chat_id           = 2;
  string sender_jid        = 3;
  bool   from_me           = 4;
  string body              = 5;
  string quoted_message_id = 6;
  string media_type        = 7;
  string media_mime        = 8;
  bytes  media_data        = 9;
  google.protobuf.Timestamp timestamp = 10;
  bytes  raw               = 11;
}

message SendTextRequest {
  string chat_id = 1;
  string text    = 2;
}

message SendTextResponse {
  string message_id = 1;
}

message SendImageRequest {
  string chat_id     = 1;
  bytes  image_bytes = 2;
  string caption     = 3;
}

message SendImageResponse {
  string message_id = 1;
}

message SendStickerRequest {
  string chat_id      = 1;
  bytes  sticker_webp = 2;
  uint32 width        = 3;
  uint32 height       = 4;
}

message SendStickerResponse {
  string message_id = 1;
}

message SendVideoRequest {
  string chat_id      = 1;
  bytes  video_bytes  = 2;
  string caption      = 3;
  string mime_type    = 4;
  string file_name    = 5;
  bool   ptt          = 6;
  bool   gif_playback = 7;
}

message SendVideoResponse {
  string message_id = 1;
}
