syntax = "proto3";

package config;

option go_package = "./config";

message Config {
  string app_name = 1;
  string environment = 2;
  string log_level = 3;
  WhatsAppConfig whats_app = 4;
  AIConfig ai = 5;
  OCRConfig ocr = 6;
  APIConfig api = 7;
  ModerationConfig moderation = 8;
  MediaConfig media = 9;
}

message WhatsAppConfig {
  string session_path = 1;
  string device_name = 2;
  string database_dialect = 3;
  string database_dsn = 4;
  string pairing_phone = 5;
  int32 event_buffer_size = 6;
}

message AIConfig {
  string provider = 1;
  string api_key = 2;
  string model = 3;
}

message OCRConfig {
  string provider = 1;
  string language = 2;
  string binary = 3;
}

message APIConfig {
  string remove_bg_url = 1;
  string jokes_url = 2;
  string anime_quote_url = 3;
  string distro_info_url = 4;
  string doa_url = 5;
  string quran_url = 6;
  string asmaul_husna_url = 7;
}

message ModerationConfig {
  repeated string blacklist_words = 1;
}

message MediaConfig {
  string remove_bg_api_key = 1;
}