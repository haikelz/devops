apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryuko-matoi
  labels:
    app: ryuko-matoi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ryuko-matoi
  template:
    metadata:
      labels:
        app: ryuko-matoi
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ryuko-matoi
      volumes:
        - name: app-data
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: ryuko-matoi
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-tmp
              mountPath: /app/tmp
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
