apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryuko-matoi
  labels:
    app: ryuko-matoi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ryuko-matoi
  template:
    metadata:
      labels:
        app: ryuko-matoi
    spec:
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ryuko-matoi
      volumes:
        - name: app-data
          hostPath:
            path: /data/ryuko-matoi
            type: DirectoryOrCreate
        - name: app-tmp
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
      containers:
        - name: ryuko-matoi
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-tmp
              mountPath: /app/tmp
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            failureThreshold: 12
          env:
            - name: REMOVE_BG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: REMOVE_BG_API_KEY
            - name: REMOVE_BG_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: REMOVE_BG_API_URL
            - name: JOKES_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: JOKES_API_URL
            - name: ANIME_QUOTE_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: ANIME_QUOTE_API_URL
            - name: DISTRO_INFO_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: DISTRO_INFO_API_URL
            - name: DOA_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: DOA_API_URL
            - name: QURAN_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: QURAN_API_URL
            - name: IMAGE_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: IMAGE_API_URL
            - name: ASMAUL_HUSNA_API_URL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: ASMAUL_HUSNA_API_URL
            - name: AI_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: AI_PROVIDER
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: AI_API_KEY
            - name: AI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: AI_MODEL
            - name: APP_NAME
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: APP_ENV
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: TZ
            - name: LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: LOG_LEVEL
            - name: LOG_DIR
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: LOG_DIR
            - name: WHATSAPP_SESSION_PATH
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: WHATSAPP_SESSION_PATH
            - name: WHATSAPP_DEVICE_NAME
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: WHATSAPP_DEVICE_NAME
            - name: WHATSAPP_DATABASE_DIALECT
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: WHATSAPP_DATABASE_DIALECT
            - name: WHATSAPP_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: WHATSAPP_DATABASE_DSN
            - name: WHATSAPP_EVENT_BUFFER_SIZE
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: WHATSAPP_EVENT_BUFFER_SIZE
            - name: OCR_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: OCR_PROVIDER
            - name: OCR_LANGUAGE
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: OCR_LANGUAGE
            - name: OCR_BINARY
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: OCR_BINARY
            - name: BRAT_FONT_PATH
              valueFrom:
                secretKeyRef:
                  name: ryuko-matoi-env
                  key: BRAT_FONT_PATH
