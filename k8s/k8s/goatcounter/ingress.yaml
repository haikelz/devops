apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goatcounter
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: ${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: goatcounter
                port:
                  number: 80
  tls:
    - hosts:
        - ${DOMAIN}
      secretName: goatcounter-tls
