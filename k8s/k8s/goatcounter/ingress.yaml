apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goatcounter
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: ${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: goatcounter
                port:
                  number: 80
  tls:
    - hosts:
        - ${DOMAIN}
      secretName: goatcounter-tls
